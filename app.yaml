

runtime: python311

# Same process model as Dockerfile / Procfile
entrypoint: gunicorn --bind :$PORT --workers 1 --threads 8 --timeout 0 app:server

instance_class: F1

automatic_scaling:
  max_instances: 20
  min_idle_instances: 0
  max_idle_instances: automatic
  min_pending_latency: automatic
  max_pending_latency: automatic

# Optional: set NOTEBOOK_PATH or other env vars here
# env_variables:
#   NOTEBOOK_PATH: "your_notebook.ipynb"
